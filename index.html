<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="description" content="Catálogo de cartas Pokémon disponibles" />
    <title>Catálogo</title>
  </head>
  <body>
    <script>
      // Anti-flash: aplica el tema ANTES de que React renderice
      ;(function(){
        var s = localStorage.getItem('snapstock_theme')
        var dark = s ? s === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches
        if (dark) document.documentElement.classList.add('dark')
      })()
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
